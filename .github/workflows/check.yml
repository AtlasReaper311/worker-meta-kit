# Syntax gate with zero dependencies: consumers created from this
# template inherit a working CI baseline on day one.
name: check
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: node --check every module
        run: |
          node --check src/meta.js
          node --check src/envelope.js
          node --check src/index.js
