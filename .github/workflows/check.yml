# Syntax gate with zero dependencies: consumers created from this
# template inherit a working CI baseline on day one.
name: check
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: 20
      - name: node --check every module
        run: |
          node --check src/meta.js
          node --check src/envelope.js
          node --check src/index.js
